name: UEFI Diagnostic Tool CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential uuid-dev iasl git gcc-11 g++-11 python3-distutils python3-venv

    - name: Setup EDK2 Environment
      run: |
        make -C BaseTools
        echo "WORKSPACE=$PWD" >> $GITHUB_ENV
        echo "EDK_TOOLS_PATH=$PWD/BaseTools" >> $GITHUB_ENV

    - name: Build MyEfiShellPkg
      run: |
        source edksetup.sh
        build -p MyEfiShellPkg/MyEfiShellPkg.dsc -a X64 -t GCC5 -b DEBUG

    - name: Run Unit Tests
      run: |
        # In a real environment, you'd run a headless QEMU or use Host-Based Unit Tests
        echo "Unit tests compiled successfully at Build/MyEfiShellPkg/DEBUG_GCC5/X64/MyShellAppTest.efi"
        
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: UEFI-Diagnostic-Tool
        path: |
          Build/MyEfiShellPkg/DEBUG_GCC5/X64/MyShellApp.efi
          Build/MyEfiShellPkg/DEBUG_GCC5/X64/MyShellAppTest.efi
