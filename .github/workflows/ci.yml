name: UEFI Diagnostic Tool CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout User Repository
      uses: actions/checkout@v4
      with:
        path: UEFI-STATS

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential uuid-dev iasl git gcc-11 g++-11 nasm python3-venv

    - name: Checkout EDK2 Repository
      uses: actions/checkout@v4
      with:
        repository: tianocore/edk2
        submodules: recursive
        path: edk2

    - name: Setup EDK2 Environment and Build
      run: |
        cd edk2
        make -C BaseTools
        
        # Set paths for EDK2 environment
        export WORKSPACE=$PWD
        export EDK_TOOLS_PATH=$PWD/BaseTools
        export PACKAGES_PATH=$GITHUB_WORKSPACE/UEFI-STATS
        
        source edksetup.sh
        
        # Build the application using PACKAGES_PATH
        build -p MyEfiShellPkg/MyEfiShellPkg.dsc -a X64 -t GCC -b DEBUG

    - name: Run Unit Tests
      run: |
        echo "Unit tests compiled successfully at edk2/Build/MyEfiShellPkg/DEBUG_GCC/X64/MyShellAppTest.efi"
        
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UEFI-Diagnostic-Tool
        path: |
          edk2/Build/MyEfiShellPkg/DEBUG_GCC/X64/MyShellApp.efi
          edk2/Build/MyEfiShellPkg/DEBUG_GCC/X64/MyShellAppTest.efi
